version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: solar_postgres
    restart: always
    environment:
      POSTGRES_USER: solar_user
      POSTGRES_PASSWORD: solar_password
      POSTGRES_DB: solar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: